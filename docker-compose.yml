version: '3.8'

services:
  nginx:
    build:
      context: ./nginx
    ports:
      - "${NGINX_PORT:-8888}:80"
    volumes:
      - hls_data:/data/hls:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-3005}:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-supersecretjwt}
      - HLS_OUTPUT_DIR=/data/hls
      - CORS_ORIGIN=${PUBLIC_APP_URL:-*}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    volumes:
      - hls_data:/data/hls
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT:-3006}:3000"
    environment:
      - PORT=3000
      - NUXT_PUBLIC_API_URL=/api
      - NUXT_PUBLIC_WS_URL=
    restart: unless-stopped

volumes:
  hls_data:
