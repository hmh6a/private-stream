version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-stream_relay}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-stream_relay}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - hls_data:/data/hls:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-stream_relay}?schema=public
      - JWT_SECRET=${JWT_SECRET:-supersecretjwt}
      - HLS_OUTPUT_DIR=/data/hls
      - CORS_ORIGIN=${PUBLIC_APP_URL:-*}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - AUTO_RESUME_STREAM=${AUTO_RESUME_STREAM:-true}
    volumes:
      - hls_data:/data/hls
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    environment:
      - NUXT_PUBLIC_API_URL=${PUBLIC_APP_URL:-}/api
      - NUXT_PUBLIC_WS_URL=${PUBLIC_APP_URL:-}
    restart: unless-stopped

volumes:
  postgres_data:
  hls_data:
